# Claude による PR 自動レビュー
#
# このワークフローは PR の open / synchronize / reopened で起動し、
# .claude/skills/pr-review を発動して .claude/rules/ に基づいたレビューを実施する。
#
# セットアップ:
#   1. このファイルを .github/workflows/claude-review.yml にコピー
#   2. リポジトリの Secrets に ANTHROPIC_API_KEY を設定
#      （Anthropic コンソールから取得: https://console.anthropic.com/）
#   3. .claude/skills/pr-review/SKILL.md と .claude/rules/ を整備
#
# 参考: https://github.com/anthropics/claude-code-action

name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    # Draft PR はスキップしたい場合は以下を有効化
    # if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # PR レビューに必要な進捗トラッキングコメントを有効化
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            BASE BRANCH: ${{ github.event.pull_request.base.ref }}
            HEAD BRANCH: ${{ github.event.pull_request.head.ref }}

            このリポジトリの `.claude/skills/pr-review` skill を使って、上記の PR を
            レビューしてください。レビューは `.claude/rules/` 配下のプロジェクト固有の
            ルールに厳密に従ってください。

            必ず守ること:
            - 個別の問題は `mcp__github_inline_comment__create_inline_comment` で
              該当ファイル・該当行にインラインコメントを残す
            - 全体サマリーは `gh pr comment` で 1 つだけ残す
            - レビュー本文をチャットメッセージとして返さない（GitHub 上にだけ残す）
            - ルールに書かれていない好み・一般論は指摘しない
            - すべての指摘に `[MUST] / [SHOULD] / [NIT]` ラベルを付ける
            - すべての指摘に、根拠となるルールファイル名を引用する
          claude_args: |
            --model claude-opus-4-7
            --max-turns 12
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh api:*),Read,Glob,Grep"
